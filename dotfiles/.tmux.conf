########################################
# Plugins
########################################
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

########################################
# Plugins Configurations
########################################

set -g @continuum-restore 'on'
set -g @continuum-boot 'on'
set -g @continuum-boot-options 'iterm,fullscreen'
set -g @continuum-save-interval '3'
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'

########################################
# Configurations
########################################

bind r source-file ~/.tmux.conf \; display "Reloaded!" 

set -g mouse on
set -g base-index 1 
setw -g mode-keys vi
setw -g status-keys vi

set -g repeat-time 1000

# address vim mode switching delay (http://superuser.com/a/252717/65504)
set -s escape-time 0

# increase scrollback buffer size
set -g history-limit 50000

# tmux messages are displayed for 4 seconds
set -g display-time 4000

# upgrade $TERM
set -g default-terminal "xterm-256color"

# for tmux 3.2, you can use the following setting instead:
set -as terminal-features ",xterm-256color:RGB"

# focus events enabled for terminals that support them
set -g focus-events on

# super useful when using "grouped sessions" and multi-monitor setup
setw -g aggressive-resize on

# Rebinding Prefix key
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# vim-like pane splitting
unbind %
unbind '"'
unbind s
unbind v
bind s split-window -v
bind v split-window -h

# vim-like pane resizing
bind -r C-k resize-pane -U
bind -r C-j resize-pane -D
bind -r C-h resize-pane -L
bind -r C-l resize-pane -R

# vim-like pane switching
unbind k
unbind j
unbind h
unbind l
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

# Toggle status bar
bind b set-option status

unbind w
bind w choose-tree -swZ

# ctrl+left/right cycles thru windows
bind -n C-right next
bind -n C-left prev

########################################
# Define my custom menu bar
########################################
# enable wm window titles
set -g set-titles on

# wm window title string (uses statusbar variables)
set -g set-titles-string "#S"

#### statusbar ####
set -g status-position bottom
set -g status-justify centre # center align window list
# refresh 'status-left' and 'status-right' more often
set -g status-interval 1
set-option -g automatic-rename on
set-option -g automatic-rename-format "#{?#{==:#{pane_current_command},zsh},#{b:pane_current_path},#{pane_current_command}}"


# default statusbar colors
set -g status-style fg=white,bg=default,bright

# command/message line colors
set -g message-style fg=cyan,bg=black,bright

# show host name and IP address on left side of status bar
set -g status-left-length 70
set -g status-left "#[fg=green]: #h : #[fg=yellow]#(ifconfig en0 | grep 'inet ' | awk '{print \"en0 \" $2}') #(ifconfig en1 | grep 'inet ' | awk '{print \"en1 \" $2}') #[fg=red]#(ifconfig tun0 | grep 'inet ' | awk '{print \"vpn \" $2}') "

# show session name, window & pane number, date and time on right side of
# status bar
set -g status-right-length 60
set-option -g status-right '#[fg=yellow]#S#[fg=default] : %H:%M %d-%b-%y'

########################################
# Active pane distinction
########################################

# --- Background dimming (the main cue) ---
# Active pane keeps your transparent terminal bg + bright text.
# Inactive panes get a subtle dark fill so the focused one "lifts".
set -g window-style        'fg=colour245,bg=colour235'
set -g window-active-style 'fg=terminal,bg=terminal'

# --- Thicker, brighter borders for big screens ---
set -g pane-border-lines heavy
set -g pane-border-style        'fg=colour238'
set -g pane-active-border-style 'fg=colour39,bold'

# --- Per-pane title bar with an active marker ---
set -g pane-border-status off # title bar off by default; the hook turns it on only when 2+ panes exist

set-hook -g window-layout-changed \
  'if -F "#{==:#{window_panes},1}" \
     "set -w pane-border-status off" \
     "set -w pane-border-status top"'

set -g pane-border-format '#[align=left]#{?pane_active,#[fg=colour39 bold]▶ ,#[fg=colour244]  }#P #[fg=colour244]#{pane_current_command} '

# --- Flash big pane numbers on demand (Alt-q) ---
set -g display-panes-time 2000
set -g display-panes-active-colour colour39
set -g display-panes-colour colour244
bind -n M-q display-panes

# --- window list formats (note leading/trailing spaces = padding) ---
set -g window-status-format         ' #I:#(pwd="#{pane_current_path}"; echo ${pwd####*/})#F '
set -g window-status-current-format '#{?#{==:#{session_windows},1},, #I:#(basename "#{pane_current_path}")#F }'

# --- window list styles ---
# inactive windows: muted gray, transparent bg
set-window-option -g window-status-style         'fg=colour244,bg=default'
# active window: dark text on a bright accent block — reads at a glance
set-window-option -g window-status-current-style 'fg=colour16,bg=colour24'



run '~/.tmux/plugins/tpm/tpm'
